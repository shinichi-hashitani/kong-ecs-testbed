name: Terraform AWS

on:
  pull_request:
    paths:
      - 'terraform/aws/**'
      - '.github/workflows/terraform-aws.yml'
  push:
    branches: [main]
    paths:
      - 'terraform/aws/**'
      - '.github/workflows/terraform-aws.yml'

permissions:
  id-token: write       # OIDC AssumeRoleWithWebIdentity
  contents: read
  pull-requests: write  # plan output コメント用

env:
  TF_VERSION: 1.10.5
  AWS_REGION: ap-northeast-1
  STATE_KEY: aws/terraform.tfstate

concurrency:
  group: terraform-aws-${{ github.ref }}
  cancel-in-progress: false   # apply 中の中断は避ける

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        run: |
          if [ -z "${{ vars.TF_STATE_BUCKET }}" ] || [ -z "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "::warning::GitOps secrets/vars not yet configured. Skipping. Complete 1-gitops.md Step 3 first."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

  plan:
    needs: preflight
    if: github.event_name == 'pull_request' && needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/aws
    env:
      TF_VAR_allowed_cidrs: ${{ secrets.ALLOWED_CIDRS }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true"

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform validate
        run: terraform validate

      - name: terraform plan
        run: |
          terraform plan -input=false -no-color -out=tfplan
          terraform show -no-color tfplan > tfplan.txt

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/aws/tfplan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n... (truncated)' : plan;
            const body = `### Terraform AWS plan\n\n<details><summary>Show plan</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n\n</details>`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  apply:
    needs: preflight
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/aws
    env:
      TF_VAR_allowed_cidrs: ${{ secrets.ALLOWED_CIDRS }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true"

      - name: terraform apply
        run: terraform apply -input=false -auto-approve
